<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PythonLab | Aprenda Python com interatividade</title>
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19223c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* ----- CARD PRINCIPAL ----- */
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* ----- TELA DE VERIFICAÇÃO (IDADE) ----- */
        .age-verification {
            padding: 2.5rem;
            text-align: center;
            background: rgba(10, 14, 23, 0.8);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .age-verification h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #a0f0ff, #6c5ce7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }

        .age-verification p {
            color: #b9c7d9;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .input-group input {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            padding: 0.9rem 1.2rem;
            border-radius: 2rem;
            font-size: 1rem;
            color: white;
            width: 220px;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.3);
        }

        .verify-btn {
            background: linear-gradient(90deg, #6c5ce7, #a55fef);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -8px #6c5ce7;
        }

        .error-msg {
            color: #ff7e7e;
            background: rgba(255, 70, 70, 0.15);
            padding: 0.7rem;
            border-radius: 2rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        /* ----- CONTEÚDO PRINCIPAL (ENSINO) ----- */
        .learning-dashboard {
            display: none;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo span {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e0e7ff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .progress-area {
            background: #0f172a;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar-bg {
            width: 180px;
            height: 8px;
            background: #2d3a5e;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a55fef);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Módulos estilo cards */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2.5rem;
        }

        .module-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
            cursor: pointer;
        }

        .module-card.active-module {
            border: 1px solid #a55fef;
            background: rgba(108, 92, 231, 0.15);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2);
        }

        .module-card h3 {
            color: #f0f3fa;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .module-card p {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .module-badge {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.8rem;
            background: #1e293b;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #a78bfa;
        }

        /* Área de ensino */
        .teaching-area {
            background: rgba(10, 14, 23, 0.6);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-top: 0.5rem;
        }

        .lesson-content {
            margin-bottom: 2rem;
        }

        .lesson-content h2 {
            color: #e2e8f0;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .code-block {
            background: #0a0e17;
            border-left: 4px solid #6c5ce7;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 1rem 0;
            color: #bbd7fb;
        }

        .quiz-area {
            background: #111827;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .quiz-question {
            font-weight: bold;
            margin-bottom: 1rem;
            color: #cbd5e6;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.2rem;
        }

        .quiz-option {
            background: #1e293b;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }

        .quiz-option:hover {
            background: #2d3a5e;
        }

        .quiz-feedback {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            color: #94a3b8;
        }

        .next-btn {
            background: #6c5ce7;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #5b6e8c;
        }

        @media (max-width: 680px) {
            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
            }
            .age-verification h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- TELA DE VERIFICAÇÃO DE IDADE -->
    <div id="ageVerification" class="age-verification">
        <h1>🐍 PythonLab</h1>
        <p>🔞 Acesso restrito a maiores de 18 anos.<br>Vamos aprender Python de forma interativa!</p>
        <div class="input-group">
            <input type="text" id="userName" placeholder="Seu nome" autocomplete="off">
            <input type="date" id="birthDate" value="2000-01-01">
        </div>
        <button class="verify-btn" id="verifyAgeBtn">Verificar e Entrar</button>
        <div id="ageError" class="error-msg" style="display: none;"></div>
    </div>

    <!-- DASHBOARD DE APRENDIZADO (só aparece após idade OK) -->
    <div id="learningDashboard" class="learning-dashboard">
        <div class="dashboard-header">
            <div class="logo"><span>🐍 PythonLab · Aprenda na prática</span></div>
            <div class="progress-area">
                <span>📚 Progresso</span>
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div class="modules-grid" id="modulesGrid"></div>

        <div class="teaching-area" id="teachingArea">
            <!-- conteúdo dinâmico da lição e quiz -->
        </div>
        <footer>✨ Interaja com os quizzes e domine Python! Cada módulo tem um desafio.</footer>
    </div>
</div>

<script>
    // ---------- CONTEÚDO DE ENSINO (Módulos + Lições + Quizzes) ----------
    const modulesData = [
        {
            id: 0,
            title: "1. Introdução ao Python",
            summary: "Sintaxe, primeiro print, variáveis básicas.",
            lesson: `
                <h2>🐍 Olá, mundo Python!</h2>
                <p>Python é uma linguagem de alto nível, interpretada e fácil de ler. Vamos começar com o clássico:</p>
                <div class="code-block">print("Olá, aventureiro!")</div>
                <p>Use <strong>print()</strong> para mostrar mensagens. Python usa indentação para blocos, sem chaves!</p>
                <p>💡 <strong>Curiosidade:</strong> Python é uma das linguagens mais amadas para iniciantes e IA.</p>
            `,
            quiz: {
                question: "Qual a função correta para exibir texto no terminal?",
                options: ["console.log()", "echo()", "print()", "printf()"],
                correct: 2,
                explanation: "Em Python, usamos print('texto') para exibir mensagens."
            }
        },
        {
            id: 1,
            title: "2. Variáveis e Tipos",
            summary: "int, float, str, bool e como armazenar dados.",
            lesson: `
                <h2>📦 Guardando informações</h2>
                <p>Variáveis guardam valores. Python infere o tipo automaticamente.</p>
                <div class="code-block">
idade = 25          # int (inteiro)<br>
altura = 1.75       # float<br>
nome = "Ana"        # str<br>
estudante = True    # bool
                </div>
                <p>Use <strong>type()</strong> para ver o tipo: <code>print(type(idade))</code> → <int>.</p>
            `,
            quiz: {
                question: "Qual é o tipo da variável 'preco = 19.99' ?",
                options: ["int", "float", "str", "decimal"],
                correct: 1,
                explanation: "Números com ponto decimal são do tipo float (ponto flutuante)."
            }
        },
        {
            id: 2,
            title: "3. Condicionais (if/elif/else)",
            summary: "Controle de fluxo com decisões.",
            lesson: `
                <h2>⚡ Decisões no código</h2>
                <p>Com <strong>if, elif, else</strong> você toma decisões baseadas em condições.</p>
                <div class="code-block">
nota = 85<br>
if nota >= 60:<br>
&nbsp;&nbsp;&nbsp;&nbsp;print("Aprovado")<br>
else:<br>
&nbsp;&nbsp;&nbsp;&nbsp;print("Reprovado")
                </div>
                <p>Observe a indentação (espaços) – fundamental no Python!</p>
            `,
            quiz: {
                question: "Qual palavra-chave inicia uma condicional em Python?",
                options: ["switch", "if", "when", "cond"],
                correct: 1,
                explanation: "A estrutura condicional começa com 'if', seguida da condição e dois pontos."
            }
        },
        {
            id: 3,
            title: "4. Laços de repetição",
            summary: "for, while – iterando dados.",
            lesson: `
                <h2>🔄 Repetições inteligentes</h2>
                <p><strong>for</strong> percorre sequências, <strong>while</strong> repete enquanto condição for verdadeira.</p>
                <div class="code-block">
# for com range<br>
for i in range(3):<br>
&nbsp;&nbsp;&nbsp;&nbsp;print(i)   # 0 1 2<br><br>
# while<br>
contador = 0<br>
while contador < 3:<br>
&nbsp;&nbsp;&nbsp;&nbsp;print(contador)<br>
&nbsp;&nbsp;&nbsp;&nbsp;contador += 1
                </div>
            `,
            quiz: {
                question: "Quantas vezes o bloco será executado: for x in range(4): print(x)",
                options: ["3 vezes", "4 vezes", "5 vezes", "infinito"],
                correct: 1,
                explanation: "range(4) gera 0,1,2,3 → 4 iterações."
            }
        },
        {
            id: 4,
            title: "5. Funções e reuso",
            summary: "Definindo suas próprias funções.",
            lesson: `
                <h2>⚙️ Crie blocos reutilizáveis</h2>
                <p>Funções são definidas com <strong>def</strong>. Podem receber parâmetros e retornar valores.</p>
                <div class="code-block">
def saudacao(nome):<br>
&nbsp;&nbsp;&nbsp;&nbsp;return f"Olá, {nome}!"<br><br>
mensagem = saudacao("Maria")<br>
print(mensagem)
                </div>
                <p>Use <strong>return</strong> para enviar um resultado de volta.</p>
            `,
            quiz: {
                question: "Qual palavra define uma função em Python?",
                options: ["function", "def", "fun", "define"],
                correct: 1,
                explanation: "A palavra-chave 'def' é usada para definir funções."
            }
        }
    ];

    // Variáveis globais
    let currentModule = 0;
    let quizzesAnswered = new Array(modulesData.length).fill(false);
    let quizUserChoices = new Array(modulesData.length).fill(null);
    let progress = 0;

    // Elementos DOM
    const ageDiv = document.getElementById('ageVerification');
    const dashboardDiv = document.getElementById('learningDashboard');
    const modulesGrid = document.getElementById('modulesGrid');
    const teachingArea = document.getElementById('teachingArea');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');

    // Função para atualizar barra de progresso
    function updateProgress() {
        const answeredCount = quizzesAnswered.filter(v => v === true).length;
        progress = Math.round((answeredCount / modulesData.length) * 100);
        progressFill.style.width = `${progress}%`;
        progressPercent.innerText = `${progress}%`;
        // Re-renderizar badges nos cards (opcional)
        renderModulesGrid();
    }

    // Renderizar os cards dos módulos
    function renderModulesGrid() {
        modulesGrid.innerHTML = '';
        modulesData.forEach((mod, idx) => {
            const card = document.createElement('div');
            card.className = `module-card ${currentModule === idx ? 'active-module' : ''}`;
            card.innerHTML = `
                <h3>${mod.title}</h3>
                <p>${mod.summary}</p>
                <div class="module-badge">${quizzesAnswered[idx] ? '✅ Concluído' : '📘 Pendente'}</div>
            `;
            card.addEventListener('click', () => {
                currentModule = idx;
                renderModulesGrid();
                loadLessonAndQuiz(currentModule);
            });
            modulesGrid.appendChild(card);
        });
    }

    // Carregar lição e quiz do módulo atual
    function loadLessonAndQuiz(moduleId) {
        const module = modulesData[moduleId];
        const alreadyAnswered = quizzesAnswered[moduleId];
        const selectedChoice = quizUserChoices[moduleId];

        let quizHTML = `
            <div class="quiz-area">
                <div class="quiz-question">❓ ${module.quiz.question}</div>
                <div class="quiz-options" id="quizOptions">
        `;
        module.quiz.options.forEach((opt, idx) => {
            const isChecked = (selectedChoice === idx);
            quizHTML += `
                <div class="quiz-option" data-opt-index="${idx}">
                    <input type="radio" name="quizRadio" value="${idx}" id="opt_${idx}" ${isChecked ? 'checked' : ''} ${alreadyAnswered ? 'disabled' : ''}>
                    <label for="opt_${idx}" style="margin-left: 8px; cursor:pointer;">${opt}</label>
                </div>
            `;
        });
        quizHTML += `</div><div class="quiz-feedback" id="quizFeedback"></div>`;
        if (!alreadyAnswered) {
            quizHTML += `<button class="next-btn" id="submitQuizBtn">✅ Responder</button>`;
        } else {
            const isCorrect = (selectedChoice === module.quiz.correct);
            quizHTML += `<div style="margin-top: 1rem; padding: 0.5rem; background: ${isCorrect ? '#1e3a2f' : '#3a1e2e'}; border-radius: 1rem;">
                            <strong>${isCorrect ? '✔️ Correto!' : '❌ Incorreto'}</strong><br> 
                            ${module.quiz.explanation}
                         </div>`;
        }
        quizHTML += `</div>`;

        const finalHTML = `
            <div class="lesson-content">
                ${module.lesson}
            </div>
            ${quizHTML}
        `;
        teachingArea.innerHTML = finalHTML;

        if (!alreadyAnswered) {
            // Adicionar eventos nos radios e no botão
            const submitBtn = document.getElementById('submitQuizBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const selectedRadio = document.querySelector('input[name="quizRadio"]:checked');
                    if (!selectedRadio) {
                        document.getElementById('quizFeedback').innerHTML = '⚠️ Selecione uma opção antes de responder.';
                        return;
                    }
                    const chosen = parseInt(selectedRadio.value);
                    const isCorrect = (chosen === module.quiz.correct);
                    quizUserChoices[moduleId] = chosen;
                    if (isCorrect) {
                        quizzesAnswered[moduleId] = true;
                        document.getElementById('quizFeedback').innerHTML = `✅ ${module.quiz.explanation}`;
                        updateProgress();
                        // recarrega o mesmo módulo para mostrar o feedback final e desabilitar botões
                        loadLessonAndQuiz(moduleId);
                    } else {
                        document.getElementById('quizFeedback').innerHTML = `❌ Resposta errada. ${module.quiz.explanation}`;
                        // Não marca como concluído, mantém aberto
                    }
                    renderModulesGrid(); // atualiza badge
                });
            }
        }
    }

    // Verificação de idade + inicialização
    document.getElementById('verifyAgeBtn').addEventListener('click', () => {
        const nameInput = document.getElementById('userName').value.trim();
        const birthDateStr = document.getElementById('birthDate').value;
        const errorDiv = document.getElementById('ageError');

        if (!nameInput) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = 'Por favor, digite seu nome.';
            return;
        }
        if (!birthDateStr) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = 'Insira sua data de nascimento.';
            return;
        }

        const birthDate = new Date(birthDateStr);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }

        if (isNaN(age) || age < 18) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = `🔞 Acesso negado. Você tem ${age} anos. É necessário ter 18 anos ou mais para aprender Python aqui.`;
            return;
        }

        // IDADE OK => mostrar dashboard
        errorDiv.style.display = 'none';
        ageDiv.style.display = 'none';
        dashboardDiv.style.display = 'block';

        // Inicializar ambiente de aprendizado
        currentModule = 0;
        renderModulesGrid();
        loadLessonAndQuiz(0);
        updateProgress();
    });

    // Caso alguém tente entrar sem verificar (segurança extra)
    // Dashboard já começa escondido
</script>
</body>
</html>
