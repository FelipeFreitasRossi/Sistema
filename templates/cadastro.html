{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-card rounded-2xl p-8 shadow-2xl animate-fade-in">
    <div class="text-center">
        <i class="fab fa-python text-6xl text-blue-400 mb-4"></i>
        <h1 class="text-3xl font-bold gradient-text mb-2 flex items-center justify-center gap-2">
            <i class="fab fa-python text-4xl"></i>
            Finalizar compra
        </h1>
        <p class="text-gray-300 mb-6">Preencha seus dados para acessar o curso</p>
        <div class="bg-blue-900/30 rounded-full p-2 w-20 h-20 mx-auto flex items-center justify-center">
            <i class="fas fa-tag text-3xl text-green-400"></i>
        </div>
        <p class="text-white mt-4 font-semibold">Valor: R$ 19,99</p>
    </div>

    <div class="mt-8 space-y-4">
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-user mr-2"></i>Nome completo</label>
            <input type="text" id="nome" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500 transition" placeholder="Seu nome">
        </div>
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-envelope mr-2"></i>E-mail</label>
            <input type="email" id="email" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500 transition" placeholder="exemplo@email.com">
        </div>
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-id-card mr-2"></i>CPF</label>
            <input type="text" id="cpf" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500 transition" placeholder="000.000.000-00" maxlength="14">
        </div>
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-calendar-alt mr-2"></i>Data de nascimento</label>
            <input type="date" id="dataNascimento" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-lock mr-2"></i>Senha</label>
            <input type="password" id="senha" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500 transition" placeholder="Mínimo 6 caracteres">
        </div>
        <button id="btnCadastrar" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3 rounded-xl transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
            <i class="fab fa-python"></i> Ir para pagamento
        </button>
        <div id="errorMsg" class="text-red-400 text-sm text-center hidden"></div>
    </div>
</div>

<script>
    document.getElementById('cpf').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 11) v = v.slice(0,11);
        if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3');
        else if (v.length > 3) v = v.replace(/(\d{3})(\d{3})/, '$1.$2');
        else if (v.length > 0) v = v.replace(/(\d{3})/, '$1');
        e.target.value = v;
    });

    function showToast(message, type = 'error') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast glass-card rounded-lg p-3 mb-2 flex items-center gap-2 ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('btnCadastrar').addEventListener('click', async () => {
        const btn = document.getElementById('btnCadastrar');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processando...';

        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
        const dataNascimento = document.getElementById('dataNascimento').value;
        const senha = document.getElementById('senha').value;
        const errDiv = document.getElementById('errorMsg');
        errDiv.classList.add('hidden');

        if (!nome || !email || !cpf || !dataNascimento || !senha) {
            showToast('Todos os campos são obrigatórios.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            return;
        }
        if (senha.length < 6) {
            showToast('A senha deve ter pelo menos 6 caracteres.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            return;
        }
        try {
            const res = await fetch('/cadastrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome, email, cpf, data_nascimento: dataNascimento, senha })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Cadastro realizado! Redirecionando para pagamento...', 'success');
                setTimeout(() => window.location.href = data.redirect, 1500);
            } else {
                showToast(data.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        } catch(e) {
            showToast('Erro de conexão. Tente novamente.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
    });
</script>

<style>
    @keyframes fade-in { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-in { animation: fade-in 0.6s ease-out; }
</style>
{% endblock %}
