{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-card rounded-2xl p-8 shadow-2xl animate-fade-in">
    <div class="text-center">
        <i class="fab fa-python text-7xl text-blue-400 mb-4"></i>
        <h1 class="text-3xl font-bold gradient-text mb-6 flex items-center justify-center gap-2">
            <i class="fab fa-python text-4xl"></i>
            PythonLab
        </h1>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-envelope mr-2"></i>E-mail</label>
            <input type="email" id="email" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500" placeholder="seu@email.com">
        </div>
        <div>
            <label class="block text-gray-300 mb-1"><i class="fas fa-lock mr-2"></i>Senha</label>
            <input type="password" id="senha" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-blue-500" placeholder="******">
        </div>
        <button id="btnLogin" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3 rounded-xl transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
            <i class="fab fa-python"></i> Entrar
        </button>
        <div id="errorMsg" class="text-red-400 text-sm text-center hidden"></div>
    </div>
</div>

<script>
    function showToast(message, type = 'error') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast glass-card rounded-lg p-3 mb-2 flex items-center gap-2 ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const btn = document.getElementById('btnLogin');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Entrando...';
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const errDiv = document.getElementById('errorMsg');
        errDiv.classList.add('hidden');
        if (!email || !senha) {
            showToast('Preencha e-mail e senha.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            return;
        }
        try {
            const res = await fetch('/logar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Login realizado!', 'success');
                window.location.href = data.redirect;
            } else {
                showToast(data.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        } catch(e) {
            showToast('Erro de conexão. Tente novamente.', 'error');
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
    });
</script>

<style>
    @keyframes fade-in { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-in { animation: fade-in 0.6s ease-out; }
</style>
{% endblock %}
