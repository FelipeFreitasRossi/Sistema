{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-card rounded-2xl p-8 text-center">
    <i class="fab fa-pix text-6xl text-blue-400 mb-4"></i>
    <h1 class="text-2xl font-bold gradient-text mb-2">Pagamento via PIX</h1>
    <p class="text-gray-300 mb-6">Olá, {{ user_name }}! Para liberar seu acesso, realize o pagamento de <strong class="text-green-400">R$ 19,99</strong> para a chave abaixo:</p>

    <div class="bg-gray-800 p-4 rounded-xl mb-6">
        <p class="text-gray-400 text-sm">Chave PIX (CPF)</p>
        <p class="text-2xl font-mono font-bold text-white">{{ chave_pix }}</p>
        <button onclick="navigator.clipboard.writeText('{{ chave_pix }}')" class="mt-2 text-blue-400 text-sm">📋 Copiar</button>
    </div>

    <p class="text-gray-400 text-sm mb-4">Após pagar, informe seu CPF para confirmar:</p>
    <input type="text" id="cpf" placeholder="CPF (apenas números)" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white mb-4">
    <button id="btnConfirmar" class="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 text-white font-bold py-3 rounded-xl transition-all">
        <i class="fas fa-check-circle mr-2"></i> Já paguei, confirmar acesso
    </button>
    <div id="msg" class="mt-4 text-sm text-yellow-400"></div>
</div>

<script>
    document.getElementById('btnConfirmar').addEventListener('click', async () => {
        const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
        const msgDiv = document.getElementById('msg');
        if (!cpf) {
            msgDiv.innerText = 'Informe o CPF usado no cadastro.';
            return;
        }
        try {
            const res = await fetch('/verificar-pagamento', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cpf: cpf })
            });
            const data = await res.json();
            if (data.success) {
                msgDiv.innerHTML = '<span class="text-green-400">✅ Pagamento confirmado! Redirecionando...</span>';
                setTimeout(() => window.location.href = data.redirect, 2000);
            } else {
                msgDiv.innerText = data.message;
            }
        } catch(err) {
            msgDiv.innerText = 'Erro de conexão. Tente novamente.';
        }
    });
</script>
{% endblock %}
