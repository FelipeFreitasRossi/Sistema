{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-card rounded-2xl p-8 text-center animate-fade-in">
    <i class="fab fa-python text-7xl text-blue-400 mb-4"></i>
    <h1 class="text-2xl font-bold gradient-text mb-2 flex items-center justify-center gap-2">
        <i class="fab fa-python text-3xl"></i>
        Pagamento via PIX
    </h1>
    <p class="text-gray-300 mb-6">Olá, {{ user_name }}! Escaneie o QR Code abaixo para pagar <strong class="text-green-400">R$ {{ "%.2f"|format(valor) }}</strong>.</p>
    
    <div class="bg-white p-4 rounded-xl inline-block mx-auto mb-4 transform transition hover:scale-105">
        <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="QR Code PIX" class="mx-auto w-48 h-48">
    </div>
    
    <div id="statusContainer" class="mt-4">
        <div class="bg-blue-900/30 rounded-lg p-3 mb-4 flex items-center justify-center gap-2">
            <i class="fas fa-spinner fa-spin text-blue-400"></i>
            <span id="statusMsg" class="text-gray-200">Aguardando pagamento...</span>
        </div>
        <button id="btnVerificar" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3 rounded-xl transition-all transform hover:scale-105">
            <i class="fas fa-sync-alt mr-2"></i> Já paguei, verificar
        </button>
    </div>
</div>

<script>
    const preferenceId = "{{ preference_id }}";
    let checkInterval;

    function showToast(message, type, containerId = 'toastContainer') {
        const container = document.getElementById(containerId);
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast glass-card rounded-lg p-3 mb-2 flex items-center gap-2 ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    async function verificar() {
        const btn = document.getElementById('btnVerificar');
        const msgSpan = document.getElementById('statusMsg');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Verificando...';
        try {
            const res = await fetch(`/verificar-pagamento/${preferenceId}`);
            const data = await res.json();
            if (data.success) {
                msgSpan.innerHTML = '<span class="text-green-400">✅ Pagamento confirmado! Redirecionando...</span>';
                showToast('Pagamento aprovado! Acesso liberado.', 'success');
                clearInterval(checkInterval);
                setTimeout(() => window.location.href = data.redirect, 2000);
            } else {
                msgSpan.innerHTML = '<span class="text-yellow-400">⏳ Pagamento ainda não confirmado. Aguarde...</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt mr-2"></i> Já paguei, verificar';
            }
        } catch(e) {
            msgSpan.innerHTML = '<span class="text-red-400">Erro ao verificar. Tente novamente.</span>';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync-alt mr-2"></i> Já paguei, verificar';
        }
    }

    document.getElementById('btnVerificar').addEventListener('click', verificar);
    checkInterval = setInterval(verificar, 10000);
</script>

<style>
    @keyframes fade-in { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .animate-fade-in { animation: fade-in 0.5s ease-out; }
</style>
{% endblock %}
